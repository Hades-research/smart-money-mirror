<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.5" r="0.75">
      <stop offset="0" stop-color="#0a120d"/>
      <stop offset="1" stop-color="#040705"/>
    </radialGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22ff88" stop-opacity="0"/>
      <stop offset="1" stop-color="#22ff88" stop-opacity="0.55"/>
    </linearGradient>
  </defs>
  <!-- near-black terminal background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <!-- scanline texture -->
  <g stroke="#22ff88" stroke-opacity="0.045" stroke-width="3">
    <line x1="96" y1="256" x2="928" y2="256"/><line x1="96" y1="352" x2="928" y2="352"/>
    <line x1="96" y1="448" x2="928" y2="448"/><line x1="96" y1="544" x2="928" y2="544"/>
    <line x1="96" y1="640" x2="928" y2="640"/><line x1="96" y1="736" x2="928" y2="736"/>
  </g>
  <!-- radar rings -->
  <g fill="none" stroke="#22ff88">
    <circle cx="512" cy="512" r="368" stroke-width="8" stroke-opacity="0.9"/>
    <circle cx="512" cy="512" r="264" stroke-width="4" stroke-opacity="0.45"/>
    <circle cx="512" cy="512" r="160" stroke-width="4" stroke-opacity="0.3"/>
  </g>
  <!-- crosshair -->
  <g stroke="#22ff88" stroke-opacity="0.35" stroke-width="4">
    <line x1="512" y1="144" x2="512" y2="880"/>
    <line x1="144" y1="512" x2="880" y2="512"/>
  </g>
  <!-- radar sweep wedge -->
  <path d="M 512 512 L 512 148 A 364 364 0 0 1 800 296 Z" fill="url(#sweep)"/>
  <line x1="512" y1="512" x2="800" y2="296" stroke="#22ff88" stroke-width="10" stroke-linecap="round"/>
  <!-- whale blips -->
  <circle cx="648" cy="392" r="26" fill="#22ff88"/>
  <circle cx="648" cy="392" r="46" fill="none" stroke="#22ff88" stroke-width="5" stroke-opacity="0.5"/>
  <circle cx="380" cy="616" r="16" fill="#22ff88" fill-opacity="0.85"/>
  <circle cx="596" cy="688" r="11" fill="#22ff88" fill-opacity="0.6"/>
  <!-- red short blip (a losing move) -->
  <circle cx="360" cy="360" r="11" fill="#ff4d5e" fill-opacity="0.85"/>
</svg>
